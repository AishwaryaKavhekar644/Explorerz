<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts - Smart ERP</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: linear-gradient(135deg, rgba(8, 13, 24, 0.96), rgba(3, 7, 18, 0.98)), url('https://images.unsplash.com/photo-1555949963-aa79dcee981c?q=80&w=2670&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .glass-nav { background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(28px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-item { display: flex; align-items: center; gap: 0.875rem; padding: 0.875rem 1.25rem; border-radius: 0.75rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #94a3b8; font-weight: 500; font-size: 0.95rem; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateX(4px); }
        .menu-item.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; box-shadow: inset 2px 0 0 #3b82f6; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .p-content { padding: 2rem; } .hover-lift { transition: transform 0.3s ease; } .hover-lift:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-72 glass-nav flex flex-col justify-between p-5 h-full z-10 shrink-0">
        <div>
            <div class="flex items-center gap-3 mb-10 px-4 mt-4 hover-lift">
                <div class="p-2.5 bg-blue-600 rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.5)]"><i data-lucide="zap" class="w-6 h-6 text-white"></i></div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Smart ERP</h1>
            </div>
            <nav class="space-y-1">
                <a href="dashboard.html" class="menu-item"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
                <a href="inventory.html" class="menu-item"><i data-lucide="packages" class="w-5 h-5"></i> Inventory</a>
                <a href="orders.html" class="menu-item"><i data-lucide="shopping-cart" class="w-5 h-5"></i> Orders</a>
                <a href="transfers.html" class="menu-item"><i data-lucide="arrow-right-left" class="w-5 h-5"></i> Transfers</a>
                <a href="alerts.html" class="menu-item active"><i data-lucide="bell-ring" class="w-5 h-5"></i> Alerts</a>
                <a href="financial.html" class="menu-item"><i data-lucide="landmark" class="w-5 h-5"></i> Financial</a>
                <a href="analytics.html" class="menu-item"><i data-lucide="pie-chart" class="w-5 h-5"></i> Analytics</a>
            </nav>
        </div>
        <div class="space-y-2">
            <a href="settings.html" class="menu-item"><i data-lucide="settings" class="w-5 h-5"></i> Settings</a>
            <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex items-center justify-between group backdrop-blur-xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-sm font-bold shadow-lg" id="user-initial">JD</div>
                    <div>
                        <p class="text-sm font-semibold text-white" id="user-name">Loading...</p>
                        <p class="text-xs text-gray-400" id="user-role">...</p>
                    </div>
                </div>
                <button onclick="window.ERP.logout()" class="p-2 hover:bg-white/10 rounded-xl transition text-gray-400 hover:text-red-400" title="Logout"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto w-full relative">
        <header class="p-content flex justify-between items-end sticky top-0 z-20 pb-6" style="background: linear-gradient(180deg, rgba(8,13,24,0.95) 60%, rgba(8,13,24,0) 100%);">
            <div class="animate-fade-up">
                <h2 class="text-3xl font-bold text-white tracking-tight">System Alerts</h2>
                <p class="text-sm text-gray-400 mt-1">Automated intelligence & operational warnings.</p>
            </div>
            <button onclick="window.ERP.checkAlerts(); renderAlerts();" class="animate-fade-up bg-white/10 hover:bg-white/20 text-white px-5 py-3 border border-white/10 rounded-xl flex items-center gap-2 font-medium transition shadow-sm">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Re-Scan Intelligence
            </button>
        </header>

        <div class="px-content pb-content space-y-5 z-10 max-w-4xl" id="alerts-container">
            <!-- JS -->
        </div>
    </main>

    <script src="shared.js"></script>
    <script>
        window.ERP.checkAuth();
        lucide.createIcons();

        const user = window.ERP.data.currentUser;
        if(user) {
            document.getElementById('user-name').innerText = user.fullName;
            document.getElementById('user-role').innerText = user.role;
            document.getElementById('user-initial').innerText = user.fullName.charAt(0).toUpperCase();
        }

        window.actionResolver = function(id) {
            window.ERP.resolveAlert(id);
            renderAlerts();
            alert("Action executed and resolved flawlessly by Network Core.");
        };

        function renderAlerts() {
            const container = document.getElementById('alerts-container');
            container.innerHTML = '';
            
            const alerts = window.ERP.data.alerts;

            if(alerts.length === 0) {
                container.innerHTML = `
                    <div class="glass-card p-12 flex flex-col items-center justify-center text-center animate-fade-up border-green-500/20 shadow-[0_0_40px_rgba(34,197,94,0.1)]">
                        <div class="p-4 bg-green-500/10 rounded-2xl mb-5 border border-green-500/30"><i data-lucide="check-circle" class="w-12 h-12 text-green-400"></i></div>
                        <h3 class="text-2xl font-bold text-white mb-2">Network All Clear</h3>
                        <p class="text-gray-400 text-lg">Inventory thresholds and physical operations are perfectly balanced.<br>No anomalous logistics detected.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            alerts.sort((a,b) => (a.priority === 'HIGH' ? -1 : (a.type.includes('Balance') ? 0 : 1))).forEach((a, idx) => {
                const isHigh = a.priority === 'HIGH';
                let color = 'yellow';
                if(isHigh) color = 'red';
                else if(a.type.includes('Balance')) color = 'blue';

                const icon = isHigh ? 'alert-triangle' : (a.type.includes('Balance') ? 'git-compare-arrows' : 'info');

                container.innerHTML += `
                    <div class="glass-card p-8 border-${color}-500/30 bg-white/[0.01] relative overflow-hidden flex items-start gap-6 shadow-lg animate-fade-up hover-lift" style="animation-delay: ${idx * 0.1}s">
                        <div class="p-4 bg-${color}-500/10 rounded-2xl border border-${color}-500/30 text-${color}-400 shrink-0">
                            <i data-lucide="${icon}" class="w-8 h-8 ${isHigh ? 'animate-pulse' : ''}"></i>
                        </div>
                        <div class="flex-1 w-full">
                            <div class="flex items-center justify-between gap-3 mb-2 w-full">
                                <h4 class="text-xl text-white font-bold tracking-tight flex items-center gap-3">${a.type} 
                                    <span class="px-3 py-1 rounded-full text-[10px] uppercase font-bold border border-${color}-500/30 text-${color}-400 bg-${color}-500/10 shadow-[0_0_15px_rgba(var(--tw-color-${color}-500),0.2)]">${a.priority}</span>
                                </h4>
                                <button onclick="actionResolver(${a.id})" class="px-6 py-2.5 bg-${color}-600/20 hover:bg-${color}-500 text-white font-semibold rounded-xl text-sm transition shadow-md border border-${color}-500/50">
                                    Auto-Resolve Issue
                                </button>
                            </div>
                            <p class="text-gray-200 text-lg leading-relaxed mt-3 opacity-90">${a.message}</p>
                            <p class="text-sm text-gray-500 mt-4 font-medium flex items-center gap-2"><i data-lucide="clock" class="w-4 h-4"></i> Engine Scan: ${new Date(a.created_at).toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        renderAlerts();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
        createChat({ webhookUrl: 'https://krishchobe01.app.n8n.cloud/webhook/bc6a9a09-e909-4a32-a7b8-9a05f3a75bb8/chat' });
    </script>
</body>
</html>
