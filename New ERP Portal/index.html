<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ERP - Gateway</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background: linear-gradient(135deg, rgba(8, 13, 24, 0.90), rgba(3, 7, 18, 0.96)), url('https://images.unsplash.com/photo-1555949963-aa79dcee981c?q=80&w=2670&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: #f8fafc; font-family: 'Inter', sans-serif; 
        }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .input-glass:focus { background: rgba(255, 255, 255, 0.1); border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .fade-out { animation: fadeOut 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); display: none; } }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute w-[800px] h-[800px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none mix-blend-screen" style="top: -200px; left: -200px;"></div>
    <div class="absolute w-[600px] h-[600px] bg-purple-600/10 rounded-full blur-[100px] pointer-events-none mix-blend-screen" style="bottom: -200px; right: -100px;"></div>

    <div class="glass-card w-full max-w-md p-10 relative z-10" id="auth-container">
        <!-- LOGO -->
        <div class="flex flex-col items-center mb-8">
            <div class="p-3 bg-blue-600 rounded-2xl shadow-[0_0_25px_rgba(37,99,235,0.6)] mb-4">
                <i data-lucide="zap" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400 tracking-tight">Smart ERP</h1>
            <p class="text-sm text-gray-400 mt-2 text-center">Secure authentication gateway</p>
        </div>

        <!-- LOGIN FORM -->
        <form id="login-form" class="space-y-5 fade-in">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5 ml-1">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="email" id="log_email" required value="admin@erp.com" class="w-full input-glass rounded-xl pl-12 pr-4 py-3.5 text-white focus:outline-none focus:ring-0">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5 ml-1">Master Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="password" id="log_pass" required value="password" class="w-full input-glass rounded-xl pl-12 pr-4 py-3.5 text-white focus:outline-none focus:ring-0">
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3.5 rounded-xl transition shadow-[0_4px_20px_rgba(37,99,235,0.4)] mt-4">
                Authenticate Securely
            </button>
            <p class="text-center text-sm text-gray-400 mt-6">
                New authorized personnel? <a href="#" onclick="toggleAuth()" class="text-blue-400 hover:text-white transition font-medium">Request Access</a>
            </p>
        </form>

        <!-- REGISTER FORM -->
        <form id="register-form" class="space-y-5 hidden">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5 ml-1">Full Name</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="text" id="reg_name" required class="w-full input-glass rounded-xl pl-12 pr-4 py-3 text-white focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5 ml-1">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="email" id="reg_email" required class="w-full input-glass rounded-xl pl-12 pr-4 py-3 text-white focus:outline-none">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5 ml-1">Password</label>
                    <input type="password" id="reg_pass" required class="w-full input-glass rounded-xl px-4 py-3 text-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5 ml-1">Role</label>
                    <select id="reg_role" class="w-full input-glass rounded-xl px-4 py-3 text-white focus:outline-none appearance-none">
                        <option value="Manager">Manager</option>
                        <option value="Inventory Staff">Inventory Staff</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-semibold py-3.5 rounded-xl transition shadow-[0_4px_20px_rgba(147,51,234,0.4)] mt-4">
                Establish Credentials
            </button>
            <p class="text-center text-sm text-gray-400 mt-6">
                Already hold clearance? <a href="#" onclick="toggleAuth()" class="text-purple-400 hover:text-white transition font-medium">Authenticate here</a>
            </p>
        </form>
    </div>

    <script src="shared.js"></script>
    <script>
        lucide.createIcons();

        // Redirect if already logged in securely
        if(window.ERP.data.currentUser) {
            window.location.href = 'dashboard.html';
        }

        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        function toggleAuth() {
            if(loginForm.classList.contains('hidden')) {
                registerForm.classList.replace('fade-in', 'fade-out');
                setTimeout(() => {
                    registerForm.classList.add('hidden');
                    loginForm.classList.remove('hidden', 'fade-out');
                    loginForm.classList.add('fade-in');
                }, 400);
            } else {
                loginForm.classList.replace('fade-in', 'fade-out');
                setTimeout(() => {
                    loginForm.classList.add('hidden');
                    registerForm.classList.remove('hidden', 'fade-out');
                    registerForm.classList.add('fade-in');
                }, 400);
            }
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('log_email').value;
            const pass = document.getElementById('log_pass').value;
            if(window.ERP.login(email, pass)) {
                window.location.href = 'dashboard.html';
            } else {
                alert('Authentication failed: Invalid credentials.');
            }
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('reg_email').value;
            const pass = document.getElementById('reg_pass').value;
            const name = document.getElementById('reg_name').value;
            const role = document.getElementById('reg_role').value;
            
            if(window.ERP.register(name, email, pass, role, '')) {
                window.location.href = 'dashboard.html';
            } else {
                alert('Clearance denial: Email already exists in records.');
            }
        });
    </script>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
        createChat({ webhookUrl: 'https://krishchobe01.app.n8n.cloud/webhook/bc6a9a09-e909-4a32-a7b8-9a05f3a75bb8/chat' });
    </script>
</body>
</html>
