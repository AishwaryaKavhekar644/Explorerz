<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart ERP</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            background: linear-gradient(135deg, rgba(8, 13, 24, 0.96), rgba(3, 7, 18, 0.98)), url('https://images.unsplash.com/photo-1555949963-aa79dcee981c?q=80&w=2670&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: #f8fafc; font-family: 'Inter', sans-serif; 
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .glass-nav { background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(28px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-item { display: flex; align-items: center; gap: 0.875rem; padding: 0.875rem 1.25rem; border-radius: 0.75rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #94a3b8; font-weight: 500; font-size: 0.95rem; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateX(4px); }
        .menu-item.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; box-shadow: inset 2px 0 0 #3b82f6; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; } .delay-3 { animation-delay: 0.3s; }
        
        .hover-lift { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
        
        .p-content { padding: 2rem; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-72 glass-nav flex flex-col justify-between p-5 h-full z-10 shrink-0">
        <div>
            <div class="flex items-center gap-3 mb-10 px-4 mt-4 hover-lift">
                <div class="p-2.5 bg-blue-600 rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.5)]"><i data-lucide="zap" class="w-6 h-6 text-white"></i></div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Smart ERP</h1>
            </div>
            
            <nav class="space-y-1">
                <a href="dashboard.html" class="menu-item active"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
                <a href="inventory.html" class="menu-item"><i data-lucide="packages" class="w-5 h-5"></i> Inventory</a>
                <a href="orders.html" class="menu-item"><i data-lucide="shopping-cart" class="w-5 h-5"></i> Orders</a>
                <a href="transfers.html" class="menu-item"><i data-lucide="arrow-right-left" class="w-5 h-5"></i> Transfers</a>
                <a href="alerts.html" class="menu-item"><i data-lucide="bell-ring" class="w-5 h-5"></i> Alerts</a>
                <a href="financial.html" class="menu-item"><i data-lucide="landmark" class="w-5 h-5"></i> Financial</a>
                <a href="analytics.html" class="menu-item"><i data-lucide="pie-chart" class="w-5 h-5"></i> Analytics</a>
            </nav>
        </div>
        <div class="space-y-2">
            <a href="settings.html" class="menu-item"><i data-lucide="settings" class="w-5 h-5"></i> Settings</a>
            <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex items-center justify-between group backdrop-blur-xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-sm font-bold shadow-lg" id="user-initial">JD</div>
                    <div>
                        <p class="text-sm font-semibold text-white" id="user-name">Loading...</p>
                        <p class="text-xs text-gray-400" id="user-role">...</p>
                    </div>
                </div>
                <button onclick="window.ERP.logout()" class="p-2 hover:bg-white/10 rounded-xl transition text-gray-400 hover:text-red-400" title="Logout">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto w-full relative">
        <header class="p-content flex justify-between items-end sticky top-0 z-20 pb-6" style="background: linear-gradient(180deg, rgba(8,13,24,0.95) 60%, rgba(8,13,24,0) 100%);">
            <div class="animate-fade-up">
                <h2 class="text-3xl font-bold text-white tracking-tight">Dashboard Overview</h2>
                <p class="text-gray-400 mt-1">Real-time sync. Welcome back.</p>
            </div>
            <div class="flex items-center gap-4 animate-fade-up">
                <button class="p-3 rounded-xl bg-white/10 hover:bg-white/20 backdrop-blur-md transition border border-white/10 relative">
                    <i data-lucide="bell" class="w-5 h-5 text-gray-100"></i>
                    <span id="alert-badge" class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full hidden shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
                </button>
            </div>
        </header>

        <div class="px-content pb-content space-y-8 z-10 relative">
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass-card p-6 animate-fade-up hover-lift">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-blue-500/20 rounded-xl border border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.2)]"><i data-lucide="boxes" class="w-6 h-6 text-blue-400"></i></div>
                    </div>
                    <p class="text-gray-400 text-sm font-medium mb-1">Total Network Stock</p>
                    <h3 class="text-3xl font-bold text-white tracking-tight" id="kpi-stock">0</h3>
                </div>
                <div class="glass-card p-6 animate-fade-up delay-1 hover-lift">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-purple-500/20 rounded-xl border border-purple-500/30 shadow-[0_0_15px_rgba(168,85,247,0.2)]"><i data-lucide="indian-rupee" class="w-6 h-6 text-purple-400"></i></div>
                    </div>
                    <p class="text-gray-400 text-sm font-medium mb-1">Stock Valuation</p>
                    <h3 class="text-3xl font-bold text-white tracking-tight" id="kpi-value">₹0</h3>
                </div>
                <div class="glass-card p-6 animate-fade-up delay-2 hover-lift">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-green-500/20 rounded-xl border border-green-500/30 shadow-[0_0_15px_rgba(34,197,94,0.2)]"><i data-lucide="check-circle" class="w-6 h-6 text-green-400"></i></div>
                    </div>
                    <p class="text-gray-400 text-sm font-medium mb-1">Completed Orders</p>
                    <h3 class="text-3xl font-bold text-white tracking-tight" id="kpi-orders">0</h3>
                </div>
                <div class="glass-card p-6 animate-fade-up delay-3 hover-lift">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-orange-500/20 rounded-xl border border-orange-500/30 shadow-[0_0_15px_rgba(249,115,22,0.2)]"><i data-lucide="truck" class="w-6 h-6 text-orange-400"></i></div>
                    </div>
                    <p class="text-gray-400 text-sm font-medium mb-1">Active Transfers</p>
                    <h3 class="text-3xl font-bold text-white tracking-tight" id="kpi-transfers">0</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass-card p-8 lg:col-span-2 animate-fade-up delay-1">
                    <h3 class="text-xl font-bold text-white mb-6">Orders Processing by Branch</h3>
                    <div class="relative h-64 w-full">
                        <canvas id="ordersChart"></canvas>
                    </div>
                </div>

                <div class="glass-card p-8 lg:col-span-1 border-t-4 border-t-red-500 animate-fade-up delay-2 shadow-[0_10px_40px_-10px_rgba(239,68,68,0.2)]">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold text-white flex items-center gap-2">
                            <i data-lucide="triangle-alert" class="w-6 h-6 text-red-500"></i> Action Queue
                        </h3>
                        <a href="alerts.html" class="text-sm font-medium text-blue-400 hover:text-blue-300">View All</a>
                    </div>
                    <div class="space-y-4" id="dashboard-alerts">
                        <!-- JS -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="shared.js"></script>
    <script>
        window.ERP.checkAuth();
        lucide.createIcons();

        function loadDashboard() {
            const user = window.ERP.data.currentUser;
            if(user) {
                document.getElementById('user-name').innerText = user.fullName;
                document.getElementById('user-role').innerText = user.role;
                document.getElementById('user-initial').innerText = user.fullName.charAt(0).toUpperCase();
            }

            const details = window.ERP.getInventoryDetails();
            const totalStock = details.reduce((acc, curr) => acc + curr.quantity, 0);
            const totalValue = details.reduce((acc, curr) => acc + curr.total_value, 0);
            
            const orders = window.ERP.data.orders;
            const approvedOrders = orders.filter(o => o.status === 'approved').length;
            const activeTransfers = window.ERP.data.transfers.filter(t => t.status === 'in-transit').length;

            document.getElementById('kpi-stock').innerText = totalStock.toLocaleString();
            document.getElementById('kpi-value').innerText = '₹' + totalValue.toLocaleString();
            document.getElementById('kpi-orders').innerText = approvedOrders;
            document.getElementById('kpi-transfers').innerText = activeTransfers;

            const alerts = window.ERP.data.alerts;
            const alertsContainer = document.getElementById('dashboard-alerts');
            if (alerts.length > 0) {
                document.getElementById('alert-badge').classList.remove('hidden');
                alertsContainer.innerHTML = alerts.slice(0,4).map(a => {
                    const isHigh = a.priority === 'HIGH';
                    const color = isHigh ? 'red' : (a.type.includes('Balance') ? 'blue' : 'yellow');
                    return `
                    <div class="p-3.5 rounded-xl bg-${color}-500/10 border border-${color}-500/30 flex gap-3 text-sm text-${color}-200 transition hover:bg-${color}-500/20 shadow-md">
                        <i data-lucide="${isHigh ? 'alert-triangle' : 'info'}" class="w-5 h-5 shrink-0 text-${color}-400 mt-0.5"></i>
                        <span class="leading-relaxed opacity-90">${a.message}</span>
                    </div>
                `}).join('');
            } else {
                alertsContainer.innerHTML = `<div class="p-4 rounded-xl bg-green-500/20 border border-green-500/40 flex items-center gap-3 text-green-300 shadow-md"><i data-lucide="check-circle" class="w-5 h-5"></i> All systems optimal.</div>`;
            }

            lucide.createIcons();

            // Chart.js Setup
            const branchMap = {};
            window.ERP.data.branches.forEach(b => branchMap[b.id] = { name: b.name, count: 0 });
            orders.forEach(o => {
                if(branchMap[o.branch_id]) branchMap[o.branch_id].count++;
            });

            const labels = Object.values(branchMap).map(b => b.name);
            const data = Object.values(branchMap).map(b => b.count);

            const ctx = document.getElementById('ordersChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Orders per Branch',
                        data: data,
                        backgroundColor: 'rgba(59, 130, 246, 0.7)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', stepSize: 1 } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        loadDashboard();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

    </script>
</body>
</html>
