<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Smart ERP</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background: linear-gradient(135deg, rgba(8, 13, 24, 0.96), rgba(3, 7, 18, 0.98)), url('https://images.unsplash.com/photo-1555949963-aa79dcee981c?q=80&w=2670&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: #f8fafc; font-family: 'Inter', sans-serif; 
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .glass-nav { background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(28px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-item { display: flex; align-items: center; gap: 0.875rem; padding: 0.875rem 1.25rem; border-radius: 0.75rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #94a3b8; font-weight: 500; font-size: 0.95rem; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateX(4px); }
        .menu-item.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; box-shadow: inset 2px 0 0 #3b82f6; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 50; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal.active { display: flex; opacity: 1; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .p-content { padding: 2rem; }
        .hover-lift { transition: transform 0.3s ease; }
        .hover-lift:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 glass-nav flex flex-col justify-between p-5 h-full z-10 shrink-0">
        <div>
            <div class="flex items-center gap-3 mb-10 px-4 mt-4 hover-lift">
                <div class="p-2.5 bg-blue-600 rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.5)]"><i data-lucide="zap" class="w-6 h-6 text-white"></i></div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Smart ERP</h1>
            </div>
            
            <nav class="space-y-1">
                <a href="dashboard.html" class="menu-item"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
                <a href="inventory.html" class="menu-item"><i data-lucide="packages" class="w-5 h-5"></i> Inventory</a>
                <a href="orders.html" class="menu-item active"><i data-lucide="shopping-cart" class="w-5 h-5"></i> Orders</a>
                <a href="transfers.html" class="menu-item"><i data-lucide="arrow-right-left" class="w-5 h-5"></i> Transfers</a>
                <a href="alerts.html" class="menu-item"><i data-lucide="bell-ring" class="w-5 h-5"></i> Alerts</a>
                <a href="financial.html" class="menu-item"><i data-lucide="landmark" class="w-5 h-5"></i> Financial</a>
                <a href="analytics.html" class="menu-item"><i data-lucide="pie-chart" class="w-5 h-5"></i> Analytics</a>
            </nav>
        </div>
        <div class="space-y-2">
            <a href="settings.html" class="menu-item"><i data-lucide="settings" class="w-5 h-5"></i> Settings</a>
            <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex items-center justify-between group backdrop-blur-xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-sm font-bold shadow-lg" id="user-initial">JD</div>
                    <div>
                        <p class="text-sm font-semibold text-white" id="user-name">Loading...</p>
                        <p class="text-xs text-gray-400" id="user-role">...</p>
                    </div>
                </div>
                <button onclick="window.ERP.logout()" class="p-2 hover:bg-white/10 rounded-xl transition text-gray-400 hover:text-red-400" title="Logout">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto w-full relative">
        <header class="p-content flex justify-between items-end sticky top-0 z-20 pb-6" style="background: linear-gradient(180deg, rgba(8,13,24,0.95) 60%, rgba(8,13,24,0) 100%);">
            <div class="animate-fade-up">
                <h2 class="text-3xl font-bold text-white tracking-tight">Order Workflows</h2>
                <p class="text-sm text-gray-400 mt-1">Manage, approve, or reject branch sales flows.</p>
            </div>
            <button onclick="document.getElementById('addOrderModal').classList.add('active')" class="animate-fade-up bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl flex items-center gap-2 font-semibold transition shadow-[0_4px_20px_rgba(37,99,235,0.4)]">
                <i data-lucide="plus" class="w-5 h-5"></i> Create Order
            </button>
        </header>

        <div class="px-content pb-content z-10 w-full animate-fade-up" style="animation-delay: 0.1s;">
            <div class="glass-card shadow-2xl overflow-hidden p-6 text-white min-h-[300px]">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-sm font-semibold text-gray-300 border-b border-white/10 bg-white/[0.03]">
                            <th class="p-4">Order ID</th>
                            <th class="p-4">Fulfilling Branch</th>
                            <th class="p-4">Product Details</th>
                            <th class="p-4">Quantity</th>
                            <th class="p-4">Status</th>
                            <th class="p-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body" class="text-sm divide-y divide-white/5">
                        <!-- JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Create Modal -->
    <div id="addOrderModal" class="modal">
        <div class="glass-card w-full max-w-lg p-8 border border-white/10 shadow-2xl relative" id="ordModalContent">
            <h3 class="text-2xl font-bold text-white mb-6">Dispatch New Order</h3>
            <form id="addOrderForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Fulfilling Branch</label>
                    <select id="ord_branch" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 cursor-pointer"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Product Required</label>
                    <select id="ord_product" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 cursor-pointer"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Quantity Required</label>
                    <input type="number" id="ord_qty" required min="1" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
                </div>
                <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-white/10">
                    <button type="button" onclick="document.getElementById('addOrderModal').classList.remove('active')" class="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-white/10 transition">Discard</button>
                    <button type="submit" class="px-5 py-2.5 rounded-xl text-sm font-medium bg-blue-600 hover:bg-blue-500 text-white shadow-[0_4px_14px_rgba(37,99,235,0.4)] transition">Submit Workflow</button>
                </div>
            </form>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        window.ERP.checkAuth();
        lucide.createIcons();

        const user = window.ERP.data.currentUser;
        if(user) {
            document.getElementById('user-name').innerText = user.fullName;
            document.getElementById('user-role').innerText = user.role;
            document.getElementById('user-initial').innerText = user.fullName.charAt(0).toUpperCase();
        }

        function renderOrders() {
            const table = document.getElementById('orders-body');
            table.innerHTML = '';
            
            window.ERP.data.orders.forEach((o, idx) => {
                const b = window.ERP.data.branches.find(br => br.id === o.branch_id);
                const p = window.ERP.data.products.find(pr => pr.id === o.product_id);
                
                let statusHtml = '';
                if(o.status === 'pending') statusHtml = `<span class="px-3 py-1.5 rounded-full text-[10px] uppercase font-bold border border-yellow-500/30 text-yellow-400 bg-yellow-500/10">Action Req</span>`;
                else if(o.status === 'approved') statusHtml = `<span class="px-3 py-1.5 rounded-full text-[10px] uppercase font-bold border border-green-500/30 text-green-400 bg-green-500/10">Cleared</span>`;
                else if(o.status === 'rejected') statusHtml = `<span class="px-3 py-1.5 rounded-full text-[10px] uppercase font-bold border border-red-500/30 text-red-400 bg-red-500/10">Denied</span>`;

                let actions = '';
                if(o.status === 'pending') {
                    actions = `
                        <button onclick="approveOrder(${o.id})" class="p-2 bg-green-500/10 border border-green-500/30 hover:bg-green-500/30 text-green-400 rounded-lg transition shadow-sm" title="Approve Request"><i data-lucide="check" class="w-4 h-4"></i></button>
                        <button onclick="rejectOrder(${o.id})" class="p-2 bg-red-500/10 border border-red-500/30 hover:bg-red-500/30 text-red-400 rounded-lg transition shadow-sm" title="Reject Request"><i data-lucide="x" class="w-4 h-4"></i></button>
                    `;
                }

                table.innerHTML += `
                    <tr class="hover:bg-white/5 transition animate-fade-up" style="animation-delay: ${idx * 0.05}s">
                        <td class="px-4 py-5 font-bold tracking-widest text-blue-300 font-mono">#ORD-${o.id.toString().padStart(4,'0')}</td>
                        <td class="px-4 py-5 text-gray-200"><i data-lucide="warehouse" class="w-4 h-4 inline text-blue-400 mr-2"></i> ${b ? b.name : 'N/A'}</td>
                        <td class="px-4 py-5 text-gray-200 font-medium">${p ? p.name : 'N/A'}</td>
                        <td class="px-4 py-5 text-white font-bold text-xl">${o.quantity}</td>
                        <td class="px-4 py-5">${statusHtml}</td>
                        <td class="px-4 py-5 text-right flex justify-end gap-2 h-full items-center">${actions}</td>
                    </tr>
                `;
            });
            lucide.createIcons();
        }

        const bSelect = document.getElementById('ord_branch');
        const pSelect = document.getElementById('ord_product');
        window.ERP.data.branches.forEach(b => bSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`);
        window.ERP.data.products.forEach(p => pSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`);

        document.getElementById('addOrderForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const orderData = {
                branch_id: parseInt(bSelect.value),
                product_id: parseInt(pSelect.value),
                quantity: parseInt(document.getElementById('ord_qty').value)
            };
            window.ERP.addOrder(orderData);
            document.getElementById('addOrderModal').classList.remove('active');
            e.target.reset();
            renderOrders();
        });

        window.approveOrder = function(id) {
            if(window.ERP.approveOrder(id)) {
                renderOrders();
            }
        };

        window.rejectOrder = function(id) {
            const order = window.ERP.data.orders.find(o => o.id === id);
            if(order) {
                order.status = 'rejected';
                window.ERP.saveData();
                renderOrders();
            }
        };

        renderOrders();
    </script>

        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
        createChat({ webhookUrl: 'https://krishchobe01.app.n8n.cloud/webhook/bc6a9a09-e909-4a32-a7b8-9a05f3a75bb8/chat' });
    </script>
</body>
</html>
