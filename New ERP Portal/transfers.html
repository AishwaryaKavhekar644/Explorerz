<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfers - Smart ERP</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background: linear-gradient(135deg, rgba(8, 13, 24, 0.96), rgba(3, 7, 18, 0.98)), url('https://images.unsplash.com/photo-1555949963-aa79dcee981c?q=80&w=2670&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: #f8fafc; font-family: 'Inter', sans-serif; 
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .glass-nav { background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(28px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-item { display: flex; align-items: center; gap: 0.875rem; padding: 0.875rem 1.25rem; border-radius: 0.75rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #94a3b8; font-weight: 500; font-size: 0.95rem; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateX(4px); }
        .menu-item.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; box-shadow: inset 2px 0 0 #3b82f6; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 50; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal.active { display: flex; opacity: 1; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .p-content { padding: 2rem; }
        .hover-lift { transition: transform 0.3s ease; }
        .hover-lift:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 glass-nav flex flex-col justify-between p-5 h-full z-10 shrink-0">
        <div>
            <div class="flex items-center gap-3 mb-10 px-4 mt-4 hover-lift">
                <div class="p-2.5 bg-blue-600 rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.5)]"><i data-lucide="zap" class="w-6 h-6 text-white"></i></div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Smart ERP</h1>
            </div>
            
            <nav class="space-y-1">
                <a href="dashboard.html" class="menu-item"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
                <a href="inventory.html" class="menu-item"><i data-lucide="packages" class="w-5 h-5"></i> Inventory</a>
                <a href="orders.html" class="menu-item"><i data-lucide="shopping-cart" class="w-5 h-5"></i> Orders</a>
                <a href="transfers.html" class="menu-item active"><i data-lucide="arrow-right-left" class="w-5 h-5"></i> Transfers</a>
                <a href="alerts.html" class="menu-item"><i data-lucide="bell-ring" class="w-5 h-5"></i> Alerts</a>
                <a href="financial.html" class="menu-item"><i data-lucide="landmark" class="w-5 h-5"></i> Financial</a>
                <a href="analytics.html" class="menu-item"><i data-lucide="pie-chart" class="w-5 h-5"></i> Analytics</a>
            </nav>
        </div>
        <div class="space-y-2">
            <a href="settings.html" class="menu-item"><i data-lucide="settings" class="w-5 h-5"></i> Settings</a>
            <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex items-center justify-between group backdrop-blur-xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-sm font-bold shadow-lg" id="user-initial">JD</div>
                    <div>
                        <p class="text-sm font-semibold text-white" id="user-name">Loading...</p>
                        <p class="text-xs text-gray-400" id="user-role">...</p>
                    </div>
                </div>
                <button onclick="window.ERP.logout()" class="p-2 hover:bg-white/10 rounded-xl transition text-gray-400 hover:text-red-400" title="Logout">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto w-full relative">
        <header class="p-content flex justify-between items-end sticky top-0 z-20 pb-6" style="background: linear-gradient(180deg, rgba(8,13,24,0.95) 60%, rgba(8,13,24,0) 100%);">
            <div class="animate-fade-up">
                <h2 class="text-3xl font-bold text-white tracking-tight">Inter-Branch Logistics</h2>
                <p class="text-sm text-gray-400 mt-1">Cohesion model for handling global stocks seamlessly.</p>
            </div>
            <button onclick="document.getElementById('addTransferModal').classList.add('active')" class="animate-fade-up bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-xl flex items-center gap-2 font-semibold transition shadow-[0_4px_20px_rgba(147,51,234,0.4)]">
                <i data-lucide="arrow-right-left" class="w-5 h-5"></i> Initiate Transfer
            </button>
        </header>

        <div class="px-content pb-content z-10 w-full animate-fade-up" style="animation-delay: 0.1s;">
            <div class="glass-card shadow-2xl overflow-hidden p-6 text-white min-h-[300px]">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-sm font-semibold text-gray-300 border-b border-white/10 bg-white/[0.03]">
                            <th class="p-4">Tracking Code</th>
                            <th class="p-4">Route Path</th>
                            <th class="p-4">Cargo</th>
                            <th class="p-4">Volume</th>
                            <th class="p-4">Logistics Status</th>
                            <th class="p-4 text-right">Gate Actions</th>
                        </tr>
                    </thead>
                    <tbody id="transfers-body" class="text-sm divide-y divide-white/5">
                        <!-- JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Create Transfer Modal -->
    <div id="addTransferModal" class="modal">
        <div class="glass-card w-full max-w-lg p-8 border border-white/10 shadow-2xl relative">
            <h3 class="text-2xl font-bold text-white mb-6">Initialize Fleet Transfer</h3>
            <form id="addTransferForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Origin Facility</label>
                        <select id="tf_from" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1.5">Destination Facility</label>
                        <select id="tf_to" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500"></select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Cargo Identity (Product)</label>
                    <select id="tf_product" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">Volume (Qty)</label>
                    <input type="number" id="tf_qty" required min="1" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500">
                </div>
                <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-white/10">
                    <button type="button" onclick="document.getElementById('addTransferModal').classList.remove('active')" class="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-white/10 transition">Abort</button>
                    <button type="submit" class="px-6 py-3 rounded-xl text-sm font-semibold bg-purple-600 hover:bg-purple-500 text-white shadow-[0_4px_14px_rgba(168,85,247,0.4)] transition">Dispatch Unit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        window.ERP.checkAuth();
        lucide.createIcons();

        const user = window.ERP.data.currentUser;
        if(user) {
            document.getElementById('user-name').innerText = user.fullName;
            document.getElementById('user-role').innerText = user.role;
            document.getElementById('user-initial').innerText = user.fullName.charAt(0).toUpperCase();
        }

        function renderTransfers() {
            const table = document.getElementById('transfers-body');
            table.innerHTML = '';
            
            window.ERP.data.transfers.forEach((t, idx) => {
                const bFrom = window.ERP.data.branches.find(br => br.id === t.from_branch_id);
                const bTo = window.ERP.data.branches.find(br => br.id === t.to_branch_id);
                const p = window.ERP.data.products.find(pr => pr.id === t.product_id);
                
                let statusHtml = '';
                if(t.status === 'in-transit') statusHtml = `<span class="px-3 py-1.5 rounded-full text-[10px] uppercase font-bold border border-orange-500/30 text-orange-400 bg-orange-500/10 shadow-[0_0_10px_rgba(249,115,22,0.1)]">En Route</span>`;
                else if(t.status === 'completed') statusHtml = `<span class="px-3 py-1.5 rounded-full text-[10px] uppercase font-bold border border-green-500/30 text-green-400 bg-green-500/10">Arrived</span>`;

                let actions = '';
                if(t.status === 'in-transit') {
                    actions = `
                        <button onclick="window.ERP.completeTransfer(${t.id}); renderTransfers();" class="text-sm font-semibold border border-green-500/30 bg-green-500/10 hover:bg-green-500/20 text-green-300 px-4 py-2 rounded-lg transition">Sign for Cargo</button>
                    `;
                }

                table.innerHTML += `
                    <tr class="hover:bg-white/5 transition animate-fade-up group" style="animation-delay: ${idx * 0.05}s">
                        <td class="px-4 py-5 font-bold tracking-widest text-purple-300 font-mono">#TRN-${t.id.toString().padStart(4,'0')}</td>
                        <td class="px-4 py-5">
                            <div class="flex items-center gap-3">
                                <span class="text-red-300 font-medium">${bFrom ? bFrom.name : 'N/A'}</span>
                                <i data-lucide="chevrons-right" class="w-5 h-5 text-gray-500"></i>
                                <span class="text-green-300 font-medium">${bTo ? bTo.name : 'N/A'}</span>
                            </div>
                        </td>
                        <td class="px-4 py-5 text-gray-200">${p ? p.name : 'N/A'}</td>
                        <td class="px-4 py-5 text-white font-bold text-xl">${t.quantity} <span class="text-xs text-gray-500 ml-1 font-normal">units</span></td>
                        <td class="px-4 py-5">${statusHtml}</td>
                        <td class="px-4 py-5 text-right">${actions}</td>
                    </tr>
                `;
            });
            lucide.createIcons();
        }

        const fSelect = document.getElementById('tf_from');
        const tSelect = document.getElementById('tf_to');
        const pSelect = document.getElementById('tf_product');
        window.ERP.data.branches.forEach(b => {
            fSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`;
            tSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`;
        });
        window.ERP.data.products.forEach(p => pSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`);

        document.getElementById('addTransferForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const tfData = {
                from_branch_id: parseInt(fSelect.value),
                to_branch_id: parseInt(tSelect.value),
                product_id: parseInt(pSelect.value),
                quantity: parseInt(document.getElementById('tf_qty').value)
            };
            if(tfData.from_branch_id === tfData.to_branch_id) {
                alert("Logic Error: Origin and Destination facilities cannot be identical.");
                return;
            }
            if(window.ERP.addTransfer(tfData)) {
                document.getElementById('addTransferModal').classList.remove('active');
                e.target.reset();
                renderTransfers();
            }
        });

        renderTransfers();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
        createChat({ webhookUrl: 'https://krishchobe01.app.n8n.cloud/webhook/bc6a9a09-e909-4a32-a7b8-9a05f3a75bb8/chat' });
    </script>
</body>
</html>
