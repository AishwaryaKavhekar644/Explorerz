<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Smart ERP</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: linear-gradient(135deg, rgba(8, 13, 24, 0.96), rgba(3, 7, 18, 0.98)), url('https://images.unsplash.com/photo-1555949963-aa79dcee981c?q=80&w=2670&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .glass-nav { background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(28px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-item { display: flex; align-items: center; gap: 0.875rem; padding: 0.875rem 1.25rem; border-radius: 0.75rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: #94a3b8; font-weight: 500; font-size: 0.95rem; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateX(4px); }
        .menu-item.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; box-shadow: inset 2px 0 0 #3b82f6; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; }
        .p-content { padding: 2rem; } .hover-lift { transition: transform 0.3s ease; } .hover-lift:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-72 glass-nav flex flex-col justify-between p-5 h-full z-10 shrink-0">
        <div>
            <div class="flex items-center gap-3 mb-10 px-4 mt-4 hover-lift">
                <div class="p-2.5 bg-blue-600 rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.5)]"><i data-lucide="zap" class="w-6 h-6 text-white"></i></div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Smart ERP</h1>
            </div>
            <nav class="space-y-1">
                <a href="dashboard.html" class="menu-item"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
                <a href="inventory.html" class="menu-item"><i data-lucide="packages" class="w-5 h-5"></i> Inventory</a>
                <a href="orders.html" class="menu-item"><i data-lucide="shopping-cart" class="w-5 h-5"></i> Orders</a>
                <a href="transfers.html" class="menu-item"><i data-lucide="arrow-right-left" class="w-5 h-5"></i> Transfers</a>
                <a href="alerts.html" class="menu-item"><i data-lucide="bell-ring" class="w-5 h-5"></i> Alerts</a>
                <a href="financial.html" class="menu-item"><i data-lucide="landmark" class="w-5 h-5"></i> Financial</a>
                <a href="analytics.html" class="menu-item active"><i data-lucide="pie-chart" class="w-5 h-5"></i> Analytics</a>
            </nav>
        </div>
        <div class="space-y-2">
            <a href="settings.html" class="menu-item"><i data-lucide="settings" class="w-5 h-5"></i> Settings</a>
            <div class="p-4 bg-white/5 rounded-2xl border border-white/5 flex items-center justify-between group backdrop-blur-xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-sm font-bold shadow-lg" id="user-initial">JD</div>
                    <div>
                        <p class="text-sm font-semibold text-white" id="user-name">Loading...</p>
                        <p class="text-xs text-gray-400" id="user-role">...</p>
                    </div>
                </div>
                <button onclick="window.ERP.logout()" class="p-2 hover:bg-white/10 rounded-xl transition text-gray-400 hover:text-red-400" title="Logout"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto w-full relative">
        <header class="p-content flex justify-between items-end sticky top-0 z-20 pb-6" style="background: linear-gradient(180deg, rgba(8,13,24,0.95) 60%, rgba(8,13,24,0) 100%);">
            <div class="animate-fade-up">
                <h2 class="text-3xl font-bold text-white tracking-tight">Business Analytics</h2>
                <p class="text-gray-400 mt-1">Deep dive into branch performance and predictive insights.</p>
            </div>
        </header>

        <div class="px-content pb-content space-y-8 z-10 relative">
            
            <div class="glass-card p-10 animate-fade-up shadow-2xl col-span-1 lg:col-span-2">
                <div class="flex items-center gap-3 mb-8 border-b border-white/10 pb-4">
                    <div class="p-2 bg-gradient-to-tr from-purple-600 to-blue-500 rounded-lg"><i data-lucide="brain-circuit" class="w-6 h-6 text-white"></i></div>
                    <h3 class="text-2xl font-bold text-white tracking-tight">AI Predictive Insights</h3>
                </div>
                <div id="ai-insights" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- JS populated -->
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-10 animate-fade-up delay-1 flex flex-col items-center">
                    <h3 class="text-xl font-bold text-white mb-8 w-full text-left">Total Sales Distribution</h3>
                    <div class="relative w-full max-w-sm aspect-square">
                        <canvas id="salesPieChart"></canvas>
                    </div>
                </div>

                <div class="glass-card p-10 animate-fade-up delay-2 flex flex-col">
                    <h3 class="text-xl font-bold text-white mb-8">Branch Order Volume</h3>
                    <div class="relative w-full flex-grow min-h-[300px]">
                        <canvas id="ordersBarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="shared.js"></script>
    <script>
        window.ERP.checkAuth();
        lucide.createIcons();

        function loadAnalytics() {
            const user = window.ERP.data.currentUser;
            if(user) {
                document.getElementById('user-name').innerText = user.fullName;
                document.getElementById('user-role').innerText = user.role;
                document.getElementById('user-initial').innerText = user.fullName.charAt(0).toUpperCase();
            }

            const orders = window.ERP.data.orders;
            const products = window.ERP.data.products;
            
            const branchData = {};
            window.ERP.data.branches.forEach(b => branchData[b.id] = { name: b.name, revenue: 0, orders: 0 });
            
            orders.forEach(o => {
                if(o.status === 'approved') {
                    if(branchData[o.branch_id]) {
                        branchData[o.branch_id].orders++;
                        const prod = products.find(p => p.id === o.product_id);
                        if(prod) branchData[o.branch_id].revenue += (prod.unit_price * o.quantity);
                    }
                }
            });

            const labels = Object.values(branchData).map(b => b.name);
            const revenues = Object.values(branchData).map(b => b.revenue);
            const orderCounts = Object.values(branchData).map(b => b.orders);
            const colors = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444'];

            const pieCtx = document.getElementById('salesPieChart').getContext('2d');
            new Chart(pieCtx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: revenues, backgroundColor: colors, borderWidth: 0, hoverOffset: 12 }] },
                options: { responsive: true, maintainAspectRatio: false, color: '#fff', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20, font: { size: 14 } } }, tooltip: { callbacks: { label: (ctx) => ` ₹${ctx.raw.toLocaleString()}` } } }, cutout: '70%' }
            });

            const barCtx = document.getElementById('ordersBarChart').getContext('2d');
            new Chart(barCtx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Approved Orders', data: orderCounts, backgroundColor: 'rgba(168, 85, 247, 0.7)', borderColor: 'rgba(168, 85, 247, 1)', borderWidth: 1, borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', stepSize: 1 } }, x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 13 } } } } }
            });

            // Predictive Insights Generation
            const insightsContainer = document.getElementById('ai-insights');
            insightsContainer.innerHTML = '';
            
            const bVals = Object.values(branchData);
            if(bVals.length === 0) return;

            const topBranch = bVals.reduce((a,b) => a.orders > b.orders ? a : b, {orders: -1});
            if (topBranch.orders > 0) {
                insightsContainer.innerHTML += `
                <div class="p-6 bg-purple-500/10 border border-purple-500/30 rounded-2xl hover-lift shadow-lg">
                    <h4 class="font-bold text-purple-300 mb-2 flex items-center gap-2"><i data-lucide="trending-up" class="w-5 h-5"></i> Demand Surge Target: ${topBranch.name}</h4>
                    <p class="text-gray-300 text-sm leading-relaxed">${topBranch.name} is showing unprecedented order volume. Predictive logic recommends scaling physical stock capacity at this node by 25% to prevent supply bottlenecks.</p>
                </div>
                `;
            }

            const lowBranch = bVals.reduce((a,b) => a.orders < b.orders ? a : b, {orders: 999999, name: 'None'});
            if(lowBranch.orders < 5 && topBranch.orders > 0 && lowBranch.name !== topBranch.name) {
                insightsContainer.innerHTML += `
                <div class="p-6 bg-yellow-500/10 border border-yellow-500/30 rounded-2xl hover-lift shadow-lg">
                    <h4 class="font-bold text-yellow-300 mb-2 flex items-center gap-2"><i data-lucide="alert-circle" class="w-5 h-5"></i> Liquidity Optimization</h4>
                    <p class="text-gray-300 text-sm leading-relaxed">${lowBranch.name} has highly under-utilized velocity. We advise executing immediate logistics transfers of stagnant assets to ${topBranch.name}.</p>
                </div>
                `;
            }
            
            const totalSysRev = bVals.reduce((a,b) => a + b.revenue, 0);
            insightsContainer.innerHTML += `
            <div class="p-6 bg-green-500/10 border border-green-500/30 rounded-2xl hover-lift shadow-lg">
                <h4 class="font-bold text-green-300 mb-2 flex items-center gap-2"><i data-lucide="target" class="w-5 h-5"></i> Trajectory Analysis</h4>
                <p class="text-gray-300 text-sm leading-relaxed">System holds ₹${totalSysRev.toLocaleString()} in cleared revenue. Based on velocity mapping, a Q3 goal target of ₹${(totalSysRev*1.4).toLocaleString()} is firmly within predictive confidence.</p>
            </div>
            `;
            
            lucide.createIcons();
        }

        loadAnalytics();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
        createChat({ webhookUrl: 'https://krishchobe01.app.n8n.cloud/webhook/bc6a9a09-e909-4a32-a7b8-9a05f3a75bb8/chat' });
    </script>
</body>
</html>
