<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinetic ERP — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            syne: ['Syne', 'sans-serif'],
            fig: ['Figtree', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Figtree:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'Figtree', sans-serif;
      background: #080d18;
      color: #e2e8f0;
    }

    .input-field {
      background: #1f2937;
      color: #e2e8f0;
      border: 1px solid #374151;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .input-field:focus {
      box-shadow: 0 0 0 5px rgba(79, 142, 247, 0.25);
      border-color: #4f8ef7;
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fu { animation: fadeUp 0.9s cubic-bezier(0.4, 0, 0.2, 1) both; }
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.2s; }
    .d3 { animation-delay: 0.3s; }
    .d4 { animation-delay: 0.4s; }
  </style>
</head>
<body class="min-h-screen bg-[#080d18] p-6 relative overflow-auto">
  <!-- Background -->
  <div class="fixed inset-0 z-0">
    <img src="https://picsum.photos/id/1015/2000/1200" 
         alt="Background" 
         class="w-full h-full object-cover opacity-40">
    <div class="absolute inset-0 bg-gradient-to-r from-[#080d18] via-[#080d18]/90 to-transparent"></div>
  </div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 items-center relative z-10 min-h-screen py-12">
    <!-- Left Visual -->
    <div class="hidden lg:flex flex-col justify-center">
      <div class="text-6xl font-syne font-bold leading-tight text-white fu">
        Welcome Back to<br>Enterprise Intelligence.
      </div>
      <p class="mt-6 text-slate-300 max-w-md text-lg fu d1">
        Secure access to your Kinetic ERP console.
      </p>
      <div class="mt-12 text-xs text-slate-400 flex gap-8 fu d2">
        <span>SECURE</span>
        <span>INTELLIGENT</span>
        <span>INSTANT</span>
      </div>
    </div>

    <!-- Login Form -->
    <div class="card p-10 lg:p-12 max-w-lg mx-auto lg:mx-0 fu bg-[#0f172a]/80 backdrop-blur-xl rounded-3xl border border-slate-700">
      <div class="flex items-center gap-3 mb-10">
        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">K</div>
        <span class="font-syne font-bold text-3xl tracking-tight">Kinetic ERP</span>
      </div>

      <h1 class="text-3xl font-syne font-semibold mb-2 fu d1">Sign In</h1>
      <p class="text-slate-400 mb-10 fu d2">Enter your credentials to access the portal</p>

      <form class="space-y-6" onsubmit="handleLogin(event)">
        <!-- Work Email -->
        <div class="fu d3">
          <label class="block text-xs font-semibold tracking-widest text-slate-400 mb-2">WORK EMAIL</label>
          <input type="email" id="email" placeholder="you@company.com" required
                 class="input-field w-full px-6 py-4 rounded-2xl text-base focus:outline-none">
        </div>

        <!-- Password -->
        <div class="fu d4">
          <label class="block text-xs font-semibold tracking-widest text-slate-400 mb-2">PASSWORD</label>
          <input type="password" id="password" placeholder="••••••••" required
                 class="input-field w-full px-6 py-4 rounded-2xl text-base focus:outline-none">
        </div>

        <!-- Options -->
        <div class="flex items-center justify-between fu">
          <div class="flex items-center gap-2">
            <input type="checkbox" id="remember" class="w-5 h-5 accent-blue-600">
            <label for="remember" class="text-sm text-slate-400">Remember me</label>
          </div>
          <a href="#" onclick="forgotPassword()" class="text-blue-400 hover:text-blue-300 text-sm transition-colors">
            Forgot Password?
          </a>
        </div>

        <!-- Login Button -->
        <button type="submit"
                class="w-full py-4 rounded-2xl text-white font-semibold text-base mt-6 transition-all hover:scale-105"
                style="background: linear-gradient(135deg, #4f8ef7, #6366f1);">
          Sign In →
        </button>
      </form>

      <!-- Register Link -->
      <div class="text-center mt-10">
        <p class="text-sm text-slate-400">Don't have an account?</p>
        <a href="register.html" class="nav-item"            class="text-blue-400 hover:text-blue-300 text-sm mt-1 inline-flex items-center gap-2 transition-colors">
          Create Account →
        </a>
      </div>

      <div class="text-center text-xs text-slate-500 mt-12">
        AES-256 Bit Encryption Active • v4.2.0
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert("Please enter email and password");
        return;
      }

      alert(`✅ Login Successful!\n\nWelcome back, ${email.split('@')[0]}!\n\nRedirecting to Kinetic ERP Dashboard...`);
    }

    function forgotPassword() {
      alert("Password reset link has been sent to your registered email.");
    }

    function goToRegister() {
      alert("Redirecting to Registration page...");
      // window.location.href = "register.html";
    }

    document.addEventListener('DOMContentLoaded', () => {
      console.log('%c✅ Kinetic ERP Login Page Loaded Successfully!', 'color:#4f8ef7; font-weight:600');
    });
  </script>
</body>
</html>
